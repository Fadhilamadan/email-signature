<!-- Signature -->
<table
  border="0"
  cellpadding="0"
  cellspacing="0"
  width="450"
  style="table-layout: fixed"
>
  <tr>
    <!-- Avatar -->
    <td align="left" valign="middle" width="110" style="padding-right: 5px">
      <a href="#" style="text-decoration: none; color: inherit">
        <img
          src="https://raw.githubusercontent.com/Fadhilamadan/email-signature/master/assets/images/avatar.png"
          width="100"
          height="100"
          border="0"
          style="border: 0; display: block; outline: none"
          alt="Fadhil Amadan"
        />
      </a>
    </td>

    <!-- Content -->
    <td
      align="left"
      valign="top"
      width="340"
      style="font-family: Helvetica, Arial, sans-serif"
    >
      <!-- Name -->
      <div style="font-size: 12px; line-height: 16px; margin-bottom: 6px">
        <strong style="color: #000">Fadhil Amadan</strong><br />
        <span style="color: #4c5569">Software Engineer • Frontend Developer</span><br />
        <a
          href="mailto:fadhil.amadan@yahoo.co.id"
          style="color: #477ccc; text-decoration: none"
        >
          fadhil.amadan@yahoo.co.id
        </a>
      </div>

      <!-- Social -->
      <div style="margin-bottom: 8px; font-size: 0; line-height: 0">
        <a
          href="https://www.fadhilamadan.com"
          target="_blank"
          style="text-decoration: none; display: inline-block"
        >
          <img
            src="https://raw.githubusercontent.com/Fadhilamadan/email-signature/master/assets/icons/website.png"
            width="16"
            height="16"
            border="0"
            style="display: block; border: 0; outline: none; margin-right: 4px"
            alt="Website"
          />
        </a>
        <a
          href="https://www.github.com/Fadhilamadan"
          target="_blank"
          style="text-decoration: none; display: inline-block"
        >
          <img
            src="https://s3.amazonaws.com/htmlsig-assets/round/github.png"
            width="16"
            height="16"
            border="0"
            style="display: block; border: 0; outline: none; margin-right: 4px"
            alt="GitHub"
          />
        </a>
        <a
          href="https://www.linkedin.com/in/Fadhilamadan"
          target="_blank"
          style="text-decoration: none; display: inline-block"
        >
          <img
            src="https://s3.amazonaws.com/htmlsig-assets/round/linkedin.png"
            width="16"
            height="16"
            border="0"
            style="display: block; border: 0; outline: none"
            alt="LinkedIn"
          />
        </a>
      </div>

      <!-- WhatsApp -->
      <div>
        <a
          href="https://wa.me/628977348404"
          target="_blank"
          style="text-decoration: none; display: inline-block"
        >
          <img
            src="https://s3.amazonaws.com/htmlsig-assets/whatsapp/whatsapp-contact_me.png"
            width="113"
            height="35"
            border="0"
            style="border: 0; display: block; outline: none"
            alt="Contact via WhatsApp"
          />
        </a>
      </div>
    </td>
  </tr>
</table>

<!-- Spacer -->
<table border="0" cellpadding="0" cellspacing="0" width="450">
  <tr>
    <td height="12" style="line-height: 12px; font-size: 12px">&nbsp;</td>
  </tr>
</table>
